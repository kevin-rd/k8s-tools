{{- $files := .Files.Glob "configs/*" }}
{{- if empty $files }}
{{- fail "configs/* must contain at least one config file" }}
{{- end }}
{{- $configMap := default dict .Values.configMap }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "config-chart.configMapName" . }}
  labels:
    {{- include "config-chart.labels" . | nindent 4 }}
  {{- with $configMap.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  {{- range $path, $_ := $files }}
  {{ base $path }}: |-
    {{- tpl ($.Files.Get $path) $ | nindent 4 }}
  {{- end }}
