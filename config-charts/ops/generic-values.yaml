image:
  repository: ghcr.io/example/demo-app
  tag: "1.0.0"

ports:
  - name: http
    port: 80
    containerPort: 8080
    protocol: TCP

fileConfig:
  enabled: true
  existingName: demo-app-config
  mountPath: /app/config
  render:
    enabled: true
    secret:
      existingName: demo-app-config-secret
