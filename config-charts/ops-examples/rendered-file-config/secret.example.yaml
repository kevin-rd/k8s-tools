apiVersion: v1
kind: Secret
metadata:
  name: demo-app-config-secret
type: Opaque
stringData:
  POSTGRES_HOST: postgres.example.internal
  POSTGRES_USER: demo_app
  POSTGRES_PASSWORD: change-me
  # Optional because the config template provides defaults.
  POSTGRES_PORT: "5432"
  POSTGRES_SSLMODE: disable
