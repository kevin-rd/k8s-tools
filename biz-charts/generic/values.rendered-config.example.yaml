# Example values for rendering fileConfig templates with an existing Kubernetes Secret.

image:
  repository: ghcr.io/example/app
  tag: "1.0.0"

ports:
  - name: http
    port: 80
    containerPort: 8080
    protocol: TCP

fileConfig:
  enabled: true
  mountPath: /app/config
  data:
    config.yaml: |
      database:
        host: postgres.example.internal
        user: app
        password: '[[ getenv "DB_PASSWORD" ]]'
      server:
        port: 8080
  render:
    enabled: true
    secret:
      # The Secret should contain DB_PASSWORD; it is injected into the renderer env by default.
      existingName: app-config-secret
