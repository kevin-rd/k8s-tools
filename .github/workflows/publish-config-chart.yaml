name: Publish config chart

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
    env:
      PUBLISH_MANUAL: ${{ github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect config chart changes
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [ "${PUBLISH_MANUAL}" = "true" ]; then
            echo "Manual publish requested."
            echo "has_changes=true" >> "${GITHUB_OUTPUT}"
            {
              echo "## Publish config chart"
              echo ""
              echo "- Ref: \`${GITHUB_REF_NAME}\`"
              echo "- Status: manual publish requested"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          if git rev-parse "${GITHUB_SHA}^" >/dev/null 2>&1; then
            base_ref="${GITHUB_SHA}^"
          else
            base_ref="$(git hash-object -t tree /dev/null)"
          fi

          mapfile -t changed_files < <(
            git diff --name-only "${base_ref}" "${GITHUB_SHA}" -- \
              config-charts/standards/config-chart \
              config-charts/business-repo-example/configs/config-chart \
              .github/workflows/publish-config-chart.yaml |
            sort -u
          )

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "No publishable config chart changes detected."
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            {
              echo "## Publish config chart"
              echo ""
              echo "- Ref: \`${GITHUB_REF_NAME}\`"
              echo "- Status: skipped"
              echo "- Reason: no changes detected under config chart paths"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi

          printf 'Config chart changes:\n%s\n' "${changed_files[@]}"
          echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          {
            echo "## Publish config chart"
            echo ""
            echo "- Ref: \`${GITHUB_REF_NAME}\`"
            echo "- Status: detected config chart changes"
            echo ""
            echo "### Changed files"
            printf '%s\n' "${changed_files[@]}" | sed 's/^/- `/' | sed 's/$/`/'
          } >> "${GITHUB_STEP_SUMMARY}"

  publish:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    env:
      CHART_DIR: config-charts/standards/config-chart
      EXAMPLE_DIR: config-charts/business-repo-example/configs/config-chart
      OCI_REPO: oci://ghcr.io/${{ github.repository_owner }}/biz-charts
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Read chart metadata
        shell: bash
        run: |
          set -euo pipefail

          chart_name="$(awk '/^name:/ {print $2}' "${CHART_DIR}/Chart.yaml")"
          chart_version="$(awk '/^version:/ {print $2}' "${CHART_DIR}/Chart.yaml")"

          if [ "${chart_name}" != "config-chart" ]; then
            echo "Expected chart name config-chart, got ${chart_name}" >&2
            exit 1
          fi

          echo "CHART_NAME=${chart_name}" >> "${GITHUB_ENV}"
          echo "CHART_VERSION=${chart_version}" >> "${GITHUB_ENV}"

      - name: Validate chart with business example
        shell: bash
        run: |
          set -euo pipefail

          validate_dir=".build/validate-config-chart"
          rm -rf "${validate_dir}"
          mkdir -p "${validate_dir}"
          cp -R "${CHART_DIR}/." "${validate_dir}/"

          mkdir -p "${validate_dir}/configs" "${validate_dir}/values"
          rsync -a "${EXAMPLE_DIR}/files/" "${validate_dir}/configs/"
          rsync -a "${EXAMPLE_DIR}/values/" "${validate_dir}/values/"

          shopt -s nullglob
          values_files=("${validate_dir}"/values/values-*.yaml)
          if [ "${#values_files[@]}" -eq 0 ]; then
            echo "No example values files found under ${validate_dir}/values." >&2
            exit 1
          fi

          for values_file in "${values_files[@]}"; do
            echo "Validating ${values_file}"
            helm lint "${validate_dir}" -f "${values_file}"
            helm template demo-app-config "${validate_dir}" -f "${values_file}" >/dev/null
          done

      - name: Skip if chart version already exists
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p existing

          if helm pull "${OCI_REPO}/${CHART_NAME}" \
            --version "${CHART_VERSION}" \
            --destination existing >/dev/null 2>&1; then
            echo "Chart ${CHART_NAME}:${CHART_VERSION} already exists in GHCR, skipping publish."
            echo "SKIP_PUBLISH=true" >> "${GITHUB_ENV}"
          else
            echo "SKIP_PUBLISH=false" >> "${GITHUB_ENV}"
          fi

      - name: Package chart
        if: env.SKIP_PUBLISH != 'true'
        run: |
          mkdir -p dist
          helm package "${CHART_DIR}" -d dist

      - name: Push chart
        if: env.SKIP_PUBLISH != 'true'
        run: |
          helm push "dist/${CHART_NAME}-${CHART_VERSION}.tgz" "${OCI_REPO}"

      - name: Print pull command
        run: |
          echo "helm pull ${OCI_REPO}/${CHART_NAME} --version ${CHART_VERSION} --untar --untardir .build"

      - name: Write summary
        shell: bash
        run: |
          {
            echo "## Published config chart"
            echo ""
            echo "- Chart: \`${CHART_NAME}\`"
            echo "- Version: \`${CHART_VERSION}\`"
            echo "- Source: \`${CHART_DIR}\`"
            echo "- OCI: \`${OCI_REPO}/${CHART_NAME}\`"
            if [ "${SKIP_PUBLISH}" = "true" ]; then
              echo "- Status: skipped, version already exists"
            else
              echo "- Status: published"
            fi
            echo ""
            echo "### Pull template"
            echo ""
            echo '```bash'
            echo "helm pull ${OCI_REPO}/${CHART_NAME} --version ${CHART_VERSION} --untar --untardir .build"
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
