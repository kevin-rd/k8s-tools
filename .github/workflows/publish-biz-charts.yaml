name: Publish biz charts

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      publish_all:
        description: Publish all charts under biz-charts
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      charts: ${{ steps.detect.outputs.charts }}
      has_changes: ${{ steps.detect.outputs.has_changes }}
    env:
      PUBLISH_ALL_MANUAL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.publish_all == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect charts to publish
        id: detect
        shell: bash
        run: |
          set -euo pipefail

          if [ "${PUBLISH_ALL_MANUAL}" = "true" ]; then
            mapfile -t chart_dirs < <(
              git ls-files 'biz-charts/*/Chart.yaml' |
              awk -F/ '{print $1 "/" $2}' |
              sort -u
            )
          else
            if git rev-parse "${GITHUB_SHA}^" >/dev/null 2>&1; then
              base_ref="${GITHUB_SHA}^"
            else
              base_ref="$(git hash-object -t tree /dev/null)"
            fi

            mapfile -t chart_dirs < <(
              git diff --name-only "${base_ref}" "${GITHUB_SHA}" -- biz-charts |
              awk -F/ '/^biz-charts\/[^/]+\// {print $1 "/" $2}' |
              sort -u |
              while read -r chart_dir; do
                if [ -f "${chart_dir}/Chart.yaml" ]; then
                  printf '%s\n' "${chart_dir}"
                fi
              done
            )
          fi

          if [ "${#chart_dirs[@]}" -eq 0 ]; then
            echo "No publishable chart changes detected."
            echo "charts=[]" >> "${GITHUB_OUTPUT}"
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          printf 'Charts to publish:\n%s\n' "${chart_dirs[@]}"

          charts_json="$(
            printf '%s\n' "${chart_dirs[@]}" |
            jq -R -s -c 'split("\n")[:-1] | map({chart_dir: ., chart_name: (split("/")[-1])})'
          )"

          echo "charts=${charts_json}" >> "${GITHUB_OUTPUT}"
          echo "has_changes=true" >> "${GITHUB_OUTPUT}"

  publish:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix:
        chart: ${{ fromJson(needs.detect.outputs.charts) }}
    env:
      OCI_REPO: oci://ghcr.io/${{ github.repository_owner }}/biz-charts
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Login to GHCR
        shell: bash
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
            -u "${{ github.actor }}" \
            --password-stdin

      - name: Read chart metadata
        shell: bash
        run: |
          set -euo pipefail

          chart_dir="${{ matrix.chart.chart_dir }}"
          chart_name="$(awk '/^name:/ {print $2}' "${chart_dir}/Chart.yaml")"
          chart_version="$(awk '/^version:/ {print $2}' "${chart_dir}/Chart.yaml")"

          echo "CHART_DIR=${chart_dir}" >> "${GITHUB_ENV}"
          echo "CHART_NAME=${chart_name}" >> "${GITHUB_ENV}"
          echo "CHART_VERSION=${chart_version}" >> "${GITHUB_ENV}"

      - name: Lint chart
        run: helm lint "${CHART_DIR}"

      - name: Skip if chart version already exists
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p existing

          if helm pull "oci://ghcr.io/${{ github.repository_owner }}/biz-charts/${CHART_NAME}" \
            --version "${CHART_VERSION}" \
            --destination existing >/dev/null 2>&1; then
            echo "Chart ${CHART_NAME}:${CHART_VERSION} already exists in GHCR, skipping publish."
            echo "SKIP_PUBLISH=true" >> "${GITHUB_ENV}"
          else
            echo "SKIP_PUBLISH=false" >> "${GITHUB_ENV}"
          fi

      - name: Package chart
        if: env.SKIP_PUBLISH != 'true'
        run: |
          mkdir -p dist
          helm package "${CHART_DIR}" -d dist

      - name: Push chart
        if: env.SKIP_PUBLISH != 'true'
        run: |
          helm push "dist/${CHART_NAME}-${CHART_VERSION}.tgz" "${OCI_REPO}"

      - name: Print install command
        run: |
          echo "helm install ${CHART_NAME} oci://ghcr.io/${{ github.repository_owner }}/biz-charts/${CHART_NAME} --version ${CHART_VERSION}"
